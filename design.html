<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lighting Design | James Matlock</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root { --black: #080808; --deep: #0e0e0e; --charcoal: #1a1a1a; --amber: #c8882a; --amber-glow: #e8a840; --white: #f0ece4; --grey: #888078; --light-grey: #b8b0a4; --font-display: 'Cormorant Garamond', serif; --font-ui: 'Rajdhani', sans-serif; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--black); color: var(--white); font-family: var(--font-ui); overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 9999; opacity: 0.5; }

    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 500; display: flex; justify-content: space-between; align-items: center; padding: 20px 48px; background: linear-gradient(to bottom, rgba(8,8,8,0.97) 0%, rgba(8,8,8,0.85) 70%, transparent 100%); backdrop-filter: blur(4px); }
    .nav-logo img { height: 70px; width: auto; object-fit: contain; }
    .nav-center { display: flex; gap: 36px; list-style: none; }
    .nav-center a { font-size: 0.7rem; font-weight: 500; letter-spacing: 0.28em; text-transform: uppercase; color: var(--light-grey); text-decoration: none; transition: color 0.3s; padding: 4px 0; border-bottom: 1px solid transparent; }
    .nav-center a:hover, .nav-center a.active { color: var(--amber-glow); border-bottom-color: rgba(232,168,64,0.4); }

    .hamburger { display: none; flex-direction: column; gap: 5px; width: 36px; height: 36px; cursor: pointer; background: none; border: none; z-index: 600; }
    .hamburger span { display: block; width: 100%; height: 1.5px; background: var(--light-grey); }

    .portfolio-page { padding: 140px 60px 80px; }
    .page-header { margin-bottom: 48px; border-bottom: 1px solid rgba(255,255,255,0.06); padding-bottom: 36px; }
    .page-title { font-family: var(--font-display); font-size: clamp(2.5rem, 5vw, 4.5rem); font-weight: 300; }
    .page-title em { font-style: italic; color: var(--amber-glow); }

    .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 48px; }
    .filter-btn { font-family: var(--font-ui); font-size: 0.62rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--grey); border: 1px solid rgba(255,255,255,0.1); background: transparent; padding: 8px 20px; cursor: pointer; transition: all 0.3s; }
    .filter-btn:hover, .filter-btn.active { color: var(--amber-glow); border-color: rgba(232,168,64,0.5); background: rgba(232,168,64,0.05); }

    .show-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 4px; }
    .show-card { position: relative; aspect-ratio: 4/5; cursor: pointer; overflow: hidden; }
    .show-card-photo { position: absolute; inset: 0; background-size: cover; background-position: center; transition: transform 1.2s; }
    .show-card:hover .show-card-photo { transform: scale(1.1); }
    .show-card-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(8,8,8,0.95) 0%, rgba(8,8,8,0.4) 50%, transparent 100%); }
    .show-card-label { position: absolute; bottom: 24px; left: 24px; right: 24px; pointer-events: none; }
    .show-card-category { font-size: 0.55rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--amber); margin-bottom: 8px; }
    .show-card-name { font-family: var(--font-display); font-size: 1.6rem; font-weight: 300; color: var(--white); line-height: 1.1; }

    footer { background: var(--deep); border-top: 1px solid rgba(255,255,255,0.04); padding: 28px 60px; display: flex; justify-content: space-between; align-items: center; }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo"><img src="logo.png" alt="James Matlock"></a>
    <ul class="nav-center">
      <li><a href="index.html">Home</a></li>
      <li><a href="design.html" class="active">Design</a></li>
      <li><a href="programming.html">Programming</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <main class="portfolio-page">
    <header class="page-header">
      <h1 class="page-title">Lighting <em>Design</em></h1>
    </header>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="Theatre">Theatre</button>
      <button class="filter-btn" data-filter="Corporate">Corporate</button>
      <button class="filter-btn" data-filter="Film">Film</button>
      <button class="filter-btn" data-filter="Live Events">Live Events</button>
    </div>

    <div class="show-grid" id="showGrid">
      <div class="show-card" data-category="Theatre" data-name="Beetlejuice">
        <div class="show-card-photo" style="background-image: url('Beetlejuice.png');"></div>
        <div class="show-card-overlay"></div>
        <div class="show-card-label">
          <div class="show-card-category">Theatre</div>
          <div class="show-card-name">Beetlejuice</div>
        </div>
      </div>
      <div class="show-card" data-category="Theatre" data-name="Mamma Mia">
        <div class="show-card-photo" style="background-image: url('Mammamia.jpg');"></div>
        <div class="show-card-overlay"></div>
        <div class="show-card-label">
          <div class="show-card-category">Theatre</div>
          <div class="show-card-name">Mamma Mia</div>
        </div>
      </div>
      <div class="show-card" data-category="Film" data-name="Izzio DJ Video">
        <div class="show-card-photo" style="background-image: url('IzzioDJVideo.png');"></div>
        <div class="show-card-overlay"></div>
        <div class="show-card-label">
          <div class="show-card-category">Film</div>
          <div class="show-card-name">Izzio DJ Video</div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-copy">© 2025 James Matlock</div>
    <div class="footer-union">USA 829</div>
  </footer>

  <script>
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelector('.filter-btn.active').classList.remove('active');
        btn.classList.add('active');
        const filter = btn.dataset.filter;
        document.querySelectorAll('.show-card').forEach(card => {
          card.style.display = (filter === 'all' || card.dataset.category === filter) ? 'block' : 'none';
        });
      });
    });
  </script>
</body>
</html>

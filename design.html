  <style>
    /* SHARED CSS */
    :root {
      --black: #080808; --deep: #0e0e0e; --charcoal: #1a1a1a;
      --amber: #c8882a; --amber-glow: #e8a840; --white: #f0ece4;
      --grey: #888078; --light-grey: #b8b0a4;
      --font-display: 'Cormorant Garamond', serif; --font-ui: 'Rajdhani', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--black); color: var(--white); font-family: var(--font-ui); overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 9999; opacity: 0.5; }

    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 20px 48px; background: linear-gradient(to bottom, rgba(8,8,8,0.97) 0%, rgba(8,8,8,0.85) 70%, transparent 100%); backdrop-filter: blur(4px); }
    .nav-logo { display: flex; align-items: center; text-decoration: none; height: 80px; }
    .nav-logo svg { height: 80px; width: auto; }
    .nav-center { display: flex; gap: 36px; list-style: none; }
    .nav-center a { font-family: var(--font-ui); font-size: 0.7rem; font-weight: 500; letter-spacing: 0.28em; text-transform: uppercase; color: var(--light-grey); text-decoration: none; transition: color 0.3s; padding: 4px 0; border-bottom: 1px solid transparent; }
    .nav-center a:hover, .nav-center a.active { color: var(--amber-glow); border-bottom-color: rgba(232,168,64,0.4); }
    .nav-right { display: flex; align-items: center; gap: 18px; }
    .social-icon { color: var(--grey); transition: color 0.3s; display: flex; align-items: center; }
    .social-icon:hover { color: var(--amber-glow); }

    /* ── PORTFOLIO PAGE ── */
    .portfolio-page { padding: 160px 60px 80px; }
    .page-header { margin-bottom: 64px; border-bottom: 1px solid rgba(255,255,255,0.06); padding-bottom: 36px; }
    .page-eyebrow { font-size: 0.65rem; font-weight: 500; letter-spacing: 0.4em; text-transform: uppercase; color: var(--amber); margin-bottom: 14px; }
    .page-title { font-family: var(--font-display); font-size: clamp(2.5rem, 5vw, 4.5rem); font-weight: 300; line-height: 1; }
    .page-title em { font-style: italic; color: var(--amber-glow); }

    .show-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2px; }
    .show-card { position: relative; aspect-ratio: 4/3; overflow: hidden; cursor: pointer; background: var(--charcoal); }
    .show-card-placeholder { width: 100%; height: 100%; background: linear-gradient(135deg, #1a1510 0%, #0e0c09 100%); display: flex; align-items: center; justify-content: center; filter: brightness(0.7); transition: filter 0.5s, transform 0.6s; }
    .show-card-placeholder-icon { font-size: 3rem; opacity: 0.15; }
    .show-card:hover .show-card-placeholder { filter: brightness(0.75) saturate(1); transform: scale(1.04); }
    .show-card-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 55%); display: flex; flex-direction: column; justify-content: flex-end; padding: 24px; opacity: 0; transition: opacity 0.4s; }
    .show-card:hover .show-card-overlay { opacity: 1; }
    .show-card-label { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px 24px; }
    .show-card-category { font-size: 0.58rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--amber); margin-bottom: 6px; }
    .show-card-name { font-family: var(--font-display); font-size: 1.3rem; font-weight: 400; color: var(--white); }
    .show-card-venue { font-size: 0.65rem; letter-spacing: 0.15em; color: var(--light-grey); margin-top: 4px; }
    .show-card-year { position: absolute; top: 16px; right: 16px; font-size: 0.6rem; letter-spacing: 0.25em; color: rgba(232,168,64,0.7); background: rgba(0,0,0,0.5); padding: 4px 10px; }

    footer { background: var(--deep); border-top: 1px solid rgba(255,255,255,0.04); padding: 28px 60px; display: flex; justify-content: space-between; }
    .footer-copy { font-size: 0.62rem; color: rgba(136,128,120,0.5); }
    .footer-union { font-size: 0.62rem; color: rgba(200,136,42,0.5); }
  </style>
</head>

      <a href="mailto:james@example.com" class="social-icon"><svg viewBox="0 0 24 24" width="18" height="18"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" fill="currentColor"/></svg></a>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact | James Matlock</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    /* Paste shared styles from design.html here */
    :root { --black: #080808; --deep: #0e0e0e; --charcoal: #1a1a1a; --warm-dark: #141210; --amber: #c8882a; --amber-glow: #e8a840; --white: #f0ece4; --grey: #888078; --light-grey: #b8b0a4; --font-display: 'Cormorant Garamond', serif; --font-ui: 'Rajdhani', sans-serif; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--black); color: var(--white); font-family: var(--font-ui); overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 9999; opacity: 0.5; }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 20px 48px; background: linear-gradient(to bottom, rgba(8,8,8,0.97) 0%, rgba(8,8,8,0.85) 70%, transparent 100%); backdrop-filter: blur(4px); }
    .nav-logo { display: flex; align-items: center; text-decoration: none; height: 80px; }
    .nav-logo svg { height: 80px; width: auto; }
    .nav-center { display: flex; gap: 36px; list-style: none; }
    .nav-center a { font-family: var(--font-ui); font-size: 0.7rem; font-weight: 500; letter-spacing: 0.28em; text-transform: uppercase; color: var(--light-grey); text-decoration: none; transition: color 0.3s; padding: 4px 0; border-bottom: 1px solid transparent; }
    .nav-center a:hover, .nav-center a.active { color: var(--amber-glow); border-bottom-color: rgba(232,168,64,0.4); }
    .nav-right { display: flex; align-items: center; gap: 18px; }
    .social-icon { color: var(--grey); transition: color 0.3s; display: flex; align-items: center; }
    .social-icon:hover { color: var(--amber-glow); }

    /* ── CONTACT ── */
    #contact { min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; }
    .contact-left { background: var(--warm-dark); padding: 160px 80px 80px; display: flex; flex-direction: column; justify-content: center; position: relative; overflow: hidden; }
    .contact-left::before { content: ''; position: absolute; top: -200px; left: -200px; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(200,136,42,0.08) 0%, transparent 70%); pointer-events: none; }
    .contact-intro { font-family: var(--font-display); font-size: clamp(2rem, 3.5vw, 3.5rem); font-weight: 300; line-height: 1.15; margin-bottom: 28px; }
    .contact-intro em { font-style: italic; color: var(--amber-glow); }
    .contact-sub { font-size: 0.82rem; color: var(--grey); line-height: 1.8; font-weight: 300; max-width: 360px; margin-bottom: 60px; }
    .contact-info-list { display: flex; flex-direction: column; gap: 24px; }
    .contact-info-label { font-size: 0.58rem; letter-spacing: 0.4em; text-transform: uppercase; color: var(--amber); margin-bottom: 4px; }
    .contact-info-value { font-family: var(--font-display); font-size: 1rem; color: var(--white); text-decoration: none; transition: color 0.3s; }
    .contact-info-value:hover { color: var(--amber-glow); }
    .contact-right { background: var(--black); padding: 160px 80px 80px; display: flex; flex-direction: column; justify-content: center; }
    .contact-form-title { font-size: 0.62rem; font-weight: 600; letter-spacing: 0.4em; text-transform: uppercase; color: var(--amber); margin-bottom: 40px; }
    .form-group { margin-bottom: 28px; }
    .form-label { display: block; font-size: 0.6rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--grey); margin-bottom: 10px; }
    .form-input, .form-textarea { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); color: var(--white); font-family: var(--font-ui); font-size: 0.88rem; font-weight: 300; padding: 14px 18px; outline: none; transition: border-color 0.3s, background 0.3s; -webkit-appearance: none; }
    .form-input:focus, .form-textarea:focus { border-color: rgba(200,136,42,0.5); background: rgba(200,136,42,0.04); }
    .form-textarea { resize: vertical; min-height: 130px; }
    .btn-primary { display: inline-block; font-family: var(--font-ui); font-size: 0.7rem; font-weight: 600; letter-spacing: 0.3em; text-transform: uppercase; color: var(--black); background: var(--amber-glow); padding: 14px 36px; cursor: pointer; border: none; transition: background 0.3s; }
    .btn-primary:hover { background: #fff; }

    footer { background: var(--deep); border-top: 1px solid rgba(255,255,255,0.04); padding: 28px 60px; display: flex; justify-content: space-between; }
    .footer-copy { font-size: 0.62rem; color: rgba(136,128,120,0.5); }
    .footer-union { font-size: 0.62rem; color: rgba(200,136,42,0.5); }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">
      <svg xmlns="http://www.w3.org/2000/svg" width="200" height="80" viewBox="0 0 200 80">
        <text x="0" y="50" fill="#f0ece4" font-family="'Cormorant Garamond', serif" font-size="32" font-weight="300">James Matlock</text>
      </svg>
    </a>
    <ul class="nav-center">
      <li><a href="index.html">Home</a></li>
      <li><a href="design.html">Design</a></li>
      <li><a href="programming.html">Programming</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
    <div class="nav-right">
      <a href="#" class="social-icon"><svg viewBox="0 0 24 24" width="18" height="18"><path d="M7.75 2h8.5C19.42 2 22 4.58 22 7.75v8.5C22 19.42 19.42 22 16.25 22h-8.5C4.58 22 2 19.42 2 16.25v-8.5C2 4.58 4.58 2 7.75 2zm0 1.5C5.4 3.5 3.5 5.4 3.5 7.75v8.5C3.5 18.6 5.4 20.5 7.75 20.5h8.5c2.35 0 4.25-1.9 4.25-4.25v-8.5c0-2.35-1.9-4.25-4.25-4.25h-8.5zM12 7a5 5 0 110 10 5 5 0 010-10zm0 1.5a3.5 3.5 0 100 7 3.5 3.5 0 000-7zm5.25-1.5a.75.75 0 110 1.5.75.75 0 010-1.5z" fill="currentColor"/></svg></a>
      <a href="mailto:james@example.com" class="social-icon"><svg viewBox="0 0 24 24" width="18" height="18"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" fill="currentColor"/></svg></a>
    </div>
  </nav>

  <main id="contact">
    <div class="contact-left">
      <h2 class="contact-intro">Let's <em>Connect</em></h2>
      <p class="contact-sub">Available for freelance lighting design and programming projects worldwide.</p>
      <div class="contact-info-list">
        <div>
          <div class="contact-info-label">Email</div>
          <a href="mailto:james@example.com" class="contact-info-value">james@example.com</a>
        </div>
        <div>
          <div class="contact-info-label">Instagram</div>
          <a href="#" class="contact-info-value">@jamesmatlock</a>
        </div>
      </div>
    </div>
    
    <div class="contact-right">
      <div class="contact-form-title">Send a Message</div>
      <form class="contact-form" onsubmit="event.preventDefault(); alert('Form submitted! (This is a placeholder action)');">
        <div class="form-group">
          <label class="form-label">Name</label>
          <input type="text" class="form-input" placeholder="Your Name" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" placeholder="Your Email" required>
        </div>
        <div class="form-group">
          <label class="form-label">Message</label>
          <textarea class="form-textarea" placeholder="Your Message" required></textarea>
        </div>
        <button type="submit" class="btn-primary">Submit</button>
      </form>
    </div>
  </main>

  <footer>
    <div class="footer-copy">© 2024 James Matlock</div>
    <div class="footer-union">USA 829</div>
  </footer>

</body>
</html>
